<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Formulario Estilo Claro</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container"
    <h1> Formulario de Registro</h1>
    <form id="miFormulario">
      <!-- Mismos campos que el formulario anterior -->
      <div class="form-group">
        <label for="nombre">Nombre completo:</label>
        <input type="text" id="nombre" name="nombre" required placeholder="Escribe tu nombre completo" autofocus />
      </div>
      <div class="form-group">
        <label for="email">Correo electrónico:</label>
        <input type="email" id="email" name="email" required placeholder="ejemplo@correo.com" />
      </div>
      <div class="form-group">
        <label for="edad">Edad:</label>
        <input type="number" id="edad" name="edad" min="18" max="100" required />
      </div>
      <div class="form-group">
        <label for="ciudad">Ciudad:</label>
        <select id="ciudad" name="ciudad" required>
          <option value="">Selecciona tu ciudad</option>
          <option value="bogota">Bogotá</option>
          <option value="medellin">Medellín</option>
          <option value="cali">Cali</option>
          <option value="barranquilla">Barranquilla</option>
          <option value="otra">Otra</option>
        </select>
      </div>
      <div class="form-group">
        <label>Experiencia en programación:</label>
        <input type="radio" id="principiante" name="experiencia" value="principiante" required />
        <label for="principiante">Principiante</label>
        <input type="radio" id="intermedio" name="experiencia" value="intermedio" />
        <label for="intermedio">Intermedio</label>
        <input type="radio" id="avanzado" name="experiencia" value="avanzado" />
        <label for="avanzado">Avanzado</label>
      </div>
      <div class="form-group">
        <input type="checkbox" id="acepto" name="acepto" required />
        <label for="acepto">Acepto los términos y condiciones</label>
      </div>
      <div class="form-group">
        <label for="comentarios">Comentarios adicionales:</label>
        <textarea id="comentarios" name="comentarios" rows="3"></textarea>
      </div>
      <div class="form-group">
        <label for="password">Contraseña:</label>
        <input type="password" id="password" name="password" />
      </div>
      <div class="form-group">
        <label for="color">Color favorito: <span id="colorValor">#1976d2</span></label>
        <input type="color" id="color" name="color" value="#1976d2" oninput="document.getElementById('colorValor').textContent = this.value" />
      </div>
      <div class="form-group">
        <label for="fecha">Fecha de nacimiento:</label>
        <input type="date" id="fecha" name="fecha" />
      </div>
      <div class="form-group">
        <label for="fechahora">Fecha y hora de registro:</label>
        <input type="datetime-local" id="fechahora" name="fechahora" />
      </div>
      <div class="form-group">
        <label for="hora">Hora preferida de contacto:</label>
        <input type="time" id="hora" name="hora" />
      </div>
      <div class="form-group">
        <label for="mes">Mes favorito:</label>
        <input type="month" id="mes" name="mes" />
      </div>
      <div class="form-group">
        <label for="semana">Semana favorita:</label>
        <input type="week" id="semana" name="semana" />
      </div>
      <div class="form-group">
        <label for="web">Sitio web personal:</label>
        <input type="url" id="web" name="web" placeholder="https://tusitio.com" />
      </div>
      <div class="form-group">
        <label for="archivo">Sube tu imagen:</label>
        <input type="file" id="archivo" name="archivo" accept="image/*" />
      </div>
      <div class="form-group">
        <label for="busqueda">¿Qué buscas?:</label>
        <input type="search" id="busqueda" name="busqueda" placeholder="Buscar..." />
      </div>
      <div class="form-group">
        <label for="rango">Nivel de satisfacción (1-10): <span id="valorRango">5</span></label>
        <input type="range" id="rango" name="rango" min="1" max="10" value="5" oninput="document.getElementById('valorRango').textContent = this.value" />
      </div>
      <input type="hidden" name="referencia" value="formulario2025" />
      <button type="submit">🚀 Enviar</button>
      <button type="reset">🧹 Limpiar</button>
    </form>
    <div class="resultado" id="resultado">
      <h3> ¡Formulario enviado exitosamente!</h3>
      <p>Gracias por registrarte. Nos pondremos en contacto contigo pronto.</p>
    </div>
  </div>
  <script>
    document.getElementById('miFormulario').addEventListener('submit', function(e) {
      e.preventDefault();
      document.getElementById('resultado').style.display = 'block';
      alert('¡Formulario enviado correctamente! ');
    });
  </script>
</body>
</html>
